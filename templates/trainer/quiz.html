{% extends "base.html" %}
{% block title %}Квиз — LexiKo{% endblock %}
{% block content %}

<div class="page-header" style="text-align:center">
  <h1 class="page-title">Квиз</h1>
  <p class="page-subtitle">Выбери правильный перевод</p>
</div>

<div class="study-container">
  <p id="score-info" class="text-muted text-sm" style="font-weight:700"></p>

  <div id="quiz-area" style="width:100%;max-width:520px;text-align:center">
    <div class="card" style="margin-bottom:1.5rem;padding:2rem">
      <p class="text-muted text-sm" style="margin-bottom:.5rem;font-weight:700">Переведи слово:</p>
      <div class="flip-word" id="quiz-word">—</div>
      <p class="text-muted text-sm" id="quiz-example" style="margin-top:.75rem;font-style:italic"></p>
    </div>
    <div class="quiz-options" id="quiz-options"></div>
    <p id="quiz-feedback" style="margin-top:1rem;font-weight:800;min-height:1.5rem"></p>
    <button id="btn-next" class="btn btn-primary mt-2" style="display:none">Следующий →</button>
  </div>

  <div id="quiz-done" style="display:none;text-align:center">
    <div style="font-size:3rem;margin-bottom:1rem">🌿</div>
    <h3 style="font-family:'Playfair Display',serif;font-size:1.6rem;margin-bottom:.5rem">Квиз завершён!</h3>
    <p class="text-muted" id="quiz-final" style="font-weight:700"></p>
    <div class="progress-bar-wrap" style="max-width:300px;margin:1rem auto">
      <div class="progress-bar-fill" id="quiz-bar" style="width:0%"></div>
    </div>
    <div class="flex gap-1 justify-center mt-2" style="flex-wrap:wrap">
      <button onclick="startQuiz()" class="btn btn-primary">Ещё раз</button>
      <a href="{% url 'study' %}" class="btn btn-ghost">Режим карточек</a>
      <a href="{% url 'stats' %}" class="btn btn-green">Статистика</a>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const ALL_CARDS = {{ cards_json|safe }};
const CSRF = document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '';
const ROUNDS = Math.min(10, ALL_CARDS.length);
let questions = [], qIndex = 0, correct = 0, answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  questions = shuffle(ALL_CARDS).slice(0, ROUNDS).map(card => {
    const wrong = shuffle(ALL_CARDS.filter(c => c.id !== card.id)).slice(0, 3);
    return {
      card,
      options: shuffle([card.translation, ...wrong.map(w => w.translation)]),
      answer: card.translation,
    };
  });
  qIndex = 0; correct = 0;
  document.getElementById('quiz-done').style.display = 'none';
  document.getElementById('quiz-area').style.display = '';
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = questions[qIndex];
  document.getElementById('quiz-word').textContent = q.card.word;
  document.getElementById('quiz-example').textContent = q.card.example || '';
  document.getElementById('quiz-feedback').textContent = '';
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('score-info').textContent =
    `Вопрос ${qIndex + 1} из ${ROUNDS} • Правильно: ${correct}`;

  const box = document.getElementById('quiz-options');
  box.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = opt;
    btn.addEventListener('click', () => select(opt, q));
    box.appendChild(btn);
  });
}

function select(selected, q) {
  if (answered) return;
  answered = true;
  const ok = selected === q.answer;
  if (ok) correct++;

  fetch('/api/answer/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
    body: JSON.stringify({ card_id: q.card.id, correct: ok }),
  });

  document.querySelectorAll('.quiz-option').forEach(btn => {
    btn.disabled = true;
    if (btn.textContent === q.answer) btn.classList.add('correct');
    else if (btn.textContent === selected && !ok) btn.classList.add('wrong');
  });

  const fb = document.getElementById('quiz-feedback');
  fb.textContent = ok ? '✓ Правильно!' : `✗ Правильно: ${q.answer}`;
  fb.style.color = ok ? 'var(--green-dark)' : '#d95858';
  document.getElementById('btn-next').style.display = '';
}

document.getElementById('btn-next').addEventListener('click', () => {
  qIndex++;
  if (qIndex >= ROUNDS) {
    document.getElementById('quiz-area').style.display = 'none';
    document.getElementById('quiz-done').style.display = 'block';
    const pct = Math.round(correct / ROUNDS * 100);
    document.getElementById('quiz-final').textContent = `${correct} из ${ROUNDS} правильно — ${pct}%`;
    setTimeout(() => { document.getElementById('quiz-bar').style.width = pct + '%'; }, 100);
  } else {
    showQuestion();
  }
});

startQuiz();
</script>
{% endblock %}
