{% extends "base.html" %}
{% block title %}Войти — LexiKo{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1 class="auth-title">Войти в LexiKo 🌸</h1>
    <form method="post" novalidate>
      {% csrf_token %}
      {% if form.non_field_errors %}
        {% for error in form.non_field_errors %}
          <div class="form-error" style="margin-bottom:1rem">⚠ {{ error }}</div>
        {% endfor %}
      {% endif %}
      <div class="form-group">
        <label class="form-label">Логин</label>
        <input type="text" name="username" class="form-input" placeholder="Ваш логин" autocomplete="username" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input type="password" name="password" class="form-input" placeholder="Ваш пароль" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Войти</button>
    </form>
    <div class="auth-footer">
      Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
    </div>
  </div>
</div>
{% endblock %}
